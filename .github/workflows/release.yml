name: Release

# Tag-triggered: pushing a `vMAJOR.MINOR.PATCH` tag cuts a release.
# Also runnable via `workflow_dispatch` for dry-runs (uploads the artifact
# but skips the publish-release job because there's no tag to attach it to).
#
# Pre-release detection: any tag containing `-` (e.g. `v1.0.0-rc1`,
# `v0.2.0-alpha2`) is marked as a GitHub pre-release. Stable releases use
# bare semver.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Ensure only one release run at a time per tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # don't cancel: a released artifact is durable

jobs:
  build-apworld:
    name: Build release apworld zip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Bundling switch-mod sources needs the LibHakkun + OdysseyHeaders
          # submodules materialized. Archipelago submodule is also needed
          # because install_apworld.py writes into its custom_worlds/ before
          # we copy out.
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      # capture_table.h and shine_table.h must exist before install_apworld
      # --bundle-mod tries to bundle the switch-mod source tree (CaptureGate.cpp,
      # SaveLoadHook.cpp, MoonGetHook.cpp, and shine_lookup.hpp all include
      # one or the other; without them the user's wizard-driven build will
      # fail). Both headers are gitignored so we regenerate per-release. The
      # shine table emits an empty stub here because CI has no NSP to extract
      # from; the wizard re-runs sync_shine_table.py post-extraction on the
      # user's machine to populate it.
      - name: Sync capture table
        run: python scripts/sync_capture_table.py

      - name: Sync shine table (empty stub — no NSP in CI)
        run: python scripts/sync_shine_table.py

      - name: Build apworld zip with bundled mod + scripts
        run: python scripts/install_apworld.py --bundle-mod --bundle-scripts

      # PopTracker pack — generated from the same apworld data the SMOClient
      # uses, so users get a logic-graph tracker that auto-syncs YAML options
      # via the AP autotracker. Independent artifact (a separate zip the user
      # drops into PopTracker's packs/ directory). The generator is stdlib-only;
      # no extra deps to install.
      - name: Build PopTracker pack zip
        run: |
          # Strip the leading 'v' off the tag for the in-manifest version
          # (workflow_dispatch falls back to the generator's auto-detect).
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            python scripts/build_poptracker_pack.py --zip --version "$VERSION"
          else
            python scripts/build_poptracker_pack.py --zip
          fi
          ls -lah poptracker/build/

      - name: Stage release artifacts + checksum
        run: |
          mkdir release-artifacts
          cp vendor/Archipelago/custom_worlds/meatballs.apworld release-artifacts/
          # The PopTracker zip filename has the version embedded; copy whatever
          # build_poptracker_pack.py produced.
          cp poptracker/build/smo-poptracker-v*.zip release-artifacts/
          cd release-artifacts
          sha256sum meatballs.apworld > meatballs.apworld.sha256
          sha256sum smo-poptracker-v*.zip > smo-poptracker.sha256
          ls -lah

      # Audit: confirm we did NOT leak any of the Nintendo-IP files that
      # extract_shine_map.py produces. CI catches this even if the local
      # blocklist in install_apworld.py regresses.
      - name: IP-discipline audit
        run: |
          set -e
          if unzip -l release-artifacts/meatballs.apworld | grep -E '(shine|capture)_map(_review)?\.json'; then
            echo "FAIL: Nintendo-content map file leaked into the release zip"
            exit 1
          fi
          echo "OK: no Nintendo-content map files in zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: meatballs-apworld
          path: release-artifacts/*
          if-no-files-found: error

  clean-windows-audit:
    # Heavyweight install + build + audit on a fresh windows-2022 runner.
    # Tags only — PRs don't get a Windows build (the PR-time PATH-strip
    # sibling was removed 2026-05-22; cold-cache LLVM extract took longer
    # than the 20-min PR job budget). For pre-release sanity-checks,
    # workflow_dispatch this against a release-candidate tag.
    #
    # The audit is the load-bearing check: release_audit.py walks
    # %APPDATA%\SMOArchipelago\ and the switch-mod tree post-build and
    # fails if the build touched anything outside the documented scope.
    # Combined with the post-install Python sweep below (which removes
    # incidental python*.exe instances OUTSIDE the vendored
    # %LOCALAPPDATA%\SMOArchipelago\ install), this catches the
    # "build_switchmod.py shelled out to a system Python that
    # silently pip-installed somewhere" failure mode the unit tests
    # can't see.
    name: Clean Windows install + audit
    needs: build-apworld
    runs-on: windows-2022
    # DISABLED 2026-05-22: even with a 60-min budget the LLVM tar.xz download
    # from github.com to windows-2022 runners crawls (~54 min observed on
    # v0.1.34-alpha), and the cache never gets saved because the post-step
    # only runs on success — so we're stuck cold-caching every run. The audit
    # is still useful but needs to run somewhere with predictable network +
    # the ability to cache state across runs. Until we rework it (likely as a
    # local pre-tag `release_audit.py` invocation), this job is gated off so
    # tag pushes can publish. Flip the `if:` back to the tag-ref guard once
    # the redesign lands.
    timeout-minutes: 60
    if: false  # see comment above
    env:
      # Pin the vendored toolchain dirs the same way the wizard does
      # (the build.py wrapper reads these and prepends them to the
      # subprocess PATH). Defining them at job scope means every
      # PowerShell step inherits them; build_switchmod.py also reads
      # them directly so they ride into cmake too.
      SMOAP_LLVM_BIN: ${{ github.workspace }}\ci-toolchain\llvm\bin
      SMOAP_MINGW_BIN: ${{ github.workspace }}\ci-toolchain\winlibs\mingw64\bin
      # actions/setup-python's default location on windows-2022. Pinned
      # here so build_switchmod.py invokes the SAME 3.12 we pip-installed
      # lz4 into, not whatever the runner's PATH resolves first.
      SMOAP_PYTHON_BIN: ${{ github.workspace }}\.python312
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Pin Python 3.12 to a fixed location
        # actions/setup-python lands Python under the tool cache, whose
        # path varies between runner images. Copy the install into a
        # stable location under the workspace so SMOAP_PYTHON_BIN above
        # can be a job-scope constant.
        shell: pwsh
        run: |
          $src = Split-Path -Parent (Get-Command python).Source
          Copy-Item -Recurse -Force $src ${{ env.SMOAP_PYTHON_BIN }}
          # sync_capture_table imports nothing exotic, but build's elf2nso.py
          # needs lz4. Pip into the pinned dir's site-packages so SMOAP_PYTHON_BIN
          # is fully self-contained.
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" -m pip install --upgrade pip
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" -m pip install lz4 pyelftools mmh3

      # Toolchain cache: LLVM 19 + WinLibs are ~4 GB combined. Without
      # caching every tag download costs ~5 min. Keyed on the versions
      # baked into installers.py.
      - name: Cache LLVM 19 + WinLibs
        id: toolchain-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ github.workspace }}\ci-toolchain
          # Bump this key whenever LLVM_VERSION / WINLIBS_VERSION change
          # in apworld/smo_archipelago/_setup/installers.py.
          key: ci-toolchain-llvm19.1.7-winlibs-gcc16.1.0-r2

      - name: Download + extract LLVM 19.1.7
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dst = "${{ github.workspace }}\ci-toolchain\llvm"
          New-Item -ItemType Directory -Force $dst | Out-Null
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/clang+llvm-19.1.7-x86_64-pc-windows-msvc.tar.xz"
          $tar = "$env:RUNNER_TEMP\llvm.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile $tar -UseBasicParsing
          $expected = "b4557b4f012161f56a2f5d9e877ab9635cafd7a08f7affe14829bd60c9d357f0"
          $actual = (Get-FileHash $tar -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "LLVM SHA256 mismatch: $actual vs $expected" }
          # tar.exe ships with Windows 10 1803+ and handles .tar.xz.
          # Extract to a temp dir then move contents up one level (the
          # tarball roots at clang+llvm-19.1.7-x86_64-pc-windows-msvc/).
          $tmp = "$env:RUNNER_TEMP\llvm-extract"
          New-Item -ItemType Directory -Force $tmp | Out-Null
          tar -xf $tar -C $tmp
          $root = Get-ChildItem $tmp | Where-Object { $_.PSIsContainer } | Select-Object -First 1
          Move-Item "$($root.FullName)\*" $dst
          if (-not (Test-Path "$dst\bin\clang.exe")) { throw "LLVM extract failed (no bin\clang.exe)" }

      - name: Download + extract WinLibs g++
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dst = "${{ github.workspace }}\ci-toolchain\winlibs"
          New-Item -ItemType Directory -Force $dst | Out-Null
          $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/16.1.0posix-14.0.0-ucrt-r2/winlibs-x86_64-posix-seh-gcc-16.1.0-mingw-w64ucrt-14.0.0-r2.zip"
          $zip = "$env:RUNNER_TEMP\winlibs.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          # WinLibs zip is sha-pinned in installers.py — match that. If
          # the upstream hash drifts, bump both here and there together.
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          if (-not (Test-Path "$dst\mingw64\bin\g++.exe")) { throw "WinLibs extract failed (no mingw64\bin\g++.exe)" }

      - name: Resolve cmake + ninja bin dirs
        # Windows-2022 ships both, but the exact dirs drift between
        # image revisions. Capture whatever Get-Command resolves to BEFORE
        # the strip step narrows PATH; subsequent steps that prepend
        # SMOAP_CMAKE_BIN / SMOAP_NINJA_BIN to PATH (the build_switchmod.py
        # wrapper does this) get the right dirs without depending on
        # whatever the runner image happened to pin.
        shell: pwsh
        run: |
          $cmakeDir = Split-Path -Parent (Get-Command cmake).Source
          $ninjaDir = Split-Path -Parent (Get-Command ninja).Source
          echo "SMOAP_CMAKE_BIN=$cmakeDir" >> $env:GITHUB_ENV
          echo "SMOAP_NINJA_BIN=$ninjaDir" >> $env:GITHUB_ENV
          Write-Host "[resolve] cmake bin: $cmakeDir"
          Write-Host "[resolve] ninja bin: $ninjaDir"

      # Audit prerequisite: scrub incidental python*.exe interpreters
      # OUTSIDE the vendored install. The threat is build_switchmod.py
      # (or one of its CMake child calls) shelling out to bare `python`
      # / `python3` and landing on an interpreter that doesn't have
      # SMOAP_PYTHON_BIN's lz4 — masking PATH-leakage regressions until
      # an end user reports a build that "worked on the dev machine".
      # We blank the WindowsApps Store stubs in place (renaming is the
      # only safe edit; the stubs are reparse points and Remove-Item
      # refuses without elevation).
      - name: Strip incidental Pythons from PATH
        shell: pwsh
        run: |
          $allowed = @(
            "${{ env.SMOAP_PYTHON_BIN }}".ToLower(),
            "$($env:windir)\system32".ToLower()
          )
          # Enumerate every python*.exe / py.exe Get-Command can see,
          # then quarantine those outside the allowlist by renaming.
          $candidates = @("python.exe", "python3.exe", "python3.12.exe", "py.exe")
          foreach ($name in $candidates) {
            Get-Command $name -All -ErrorAction SilentlyContinue | ForEach-Object {
              $dir = (Split-Path -Parent $_.Source).ToLower()
              if ($allowed -notcontains $dir) {
                Write-Host "[strip] quarantining $($_.Source)"
                try {
                  Rename-Item -Path $_.Source -NewName "$($_.Source).ci-quarantined" -ErrorAction Stop
                } catch {
                  Write-Host "[strip] could not rename $($_.Source): $_"
                }
              }
            }
          }
          # Trim PATH to only allowed dirs so a leftover python.exe in a
          # tool-cache dir we missed above isn't reachable by bare name.
          # The resolved cmake + ninja dirs (captured above) MUST be on
          # PATH for the build to work, so they're added unconditionally.
          $kept = $env:PATH -split ';' | Where-Object {
            $_ -and ($allowed -contains $_.ToLower())
          }
          $kept += "$($env:windir)\System32"
          $kept += "$($env:windir)"
          $kept += "$env:SMOAP_CMAKE_BIN"
          $kept += "$env:SMOAP_NINJA_BIN"
          $env:PATH = ($kept | Where-Object { Test-Path $_ }) -join ';'
          [System.Environment]::SetEnvironmentVariable('PATH', $env:PATH, 'Process')
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          Write-Host "[strip] post-strip python resolution:"
          Get-Command python -All -ErrorAction SilentlyContinue | Select-Object -First 5 | Format-Table Source

      # sync_capture_table / sync_shine_table is what release_audit.py
      # would run anyway as the first two sub-steps of --build. Running
      # them explicitly here keeps the build apworld → build switch-mod
      # ordering visible in the job log (both scripts need
      # apworld/data/{items,locations}.json, which the loose checkout
      # has). The audit's --build re-runs them idempotently against the
      # resolved bundled paths. shine_table.h is a stub here because the
      # clean-Windows audit job has no NSP available; the wizard re-runs
      # sync_shine_table.py with a populated shine_map.json on the
      # user's machine.
      - name: Sync capture + shine tables (gitignored headers the build needs)
        shell: pwsh
        run: |
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" scripts\sync_capture_table.py
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" scripts\sync_shine_table.py

      - name: Run release audit (--skip-extract --build --audit)
        shell: pwsh
        run: |
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" scripts\release_audit.py --all --bridge-host 127.0.0.1

      - name: Upload audit log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: clean-windows-audit-log
          # The wizard.log under %APPDATA% is only written by the Kivy
          # wizard's `wizard_log()` helper, not by release_audit.py — so
          # there's no point uploading it from this job. The cmake +
          # ninja build logs under switch-mod\build\ are what failures
          # here actually need for diagnosis.
          path: |
            ${{ github.workspace }}\switch-mod\build\**\*.log
            ${{ github.workspace }}\switch-mod\build\**\CMakeCache.txt
            ${{ github.workspace }}\switch-mod\build\**\CMakeOutput.log
            ${{ github.workspace }}\switch-mod\build\**\CMakeError.log
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub Release
    # clean-windows-audit removed from `needs` 2026-05-22; see the gating
    # comment on that job. Restore once the audit is workable on CI.
    needs: [build-apworld]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # workflow_dispatch runs don't create a release — they only produce
    # the build artifact (downloadable from the Actions UI for testing).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: meatballs-apworld
          path: dist/

      - name: Show artifacts to be published
        run: ls -lah dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          # Any tag containing `-` (e.g. v1.0.0-rc1) is marked as pre-release.
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## SMO Archipelago ${{ github.ref_name }}

            ### First-time users — start here

            **📖 [docs/first-time-setup.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/first-time-setup.md)** — full walkthrough: prerequisites, multiworld generation, and the SMOClient setup wizard.

            ### Optional: PopTracker pack

            Download `smo-poptracker-${{ github.ref_name }}.zip` below and
            extract it into PopTracker's `packs/` directory.

            **🔄 Changing AP server / slot / bridge PC after setup:**
            [docs/changing-servers.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/changing-servers.md)

            ### Verifying the downloads

            ```
            sha256sum -c meatballs.apworld.sha256
            sha256sum -c smo-poptracker.sha256
            ```

  propose-versions-update:
    name: Open PR to update poptracker/versions.json
    needs: publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only on tag push — workflow_dispatch runs skip this for the same
    # reason publish-release does (no tag, no released artifact to link).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write       # push the new branch
      pull-requests: write  # open the PR
    # Repo setting required: Settings → Actions → General →
    # "Allow GitHub Actions to create and approve pull requests" must be
    # enabled. Without it, `gh pr create` 403s.
    steps:
      - name: Check out main (not the tag)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          fetch-depth: 0   # need history to find the prior tag for the changelog

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Download release artifact (zip + .sha256)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: meatballs-apworld
          path: release-artifacts/

      - name: Compute changelog from commits since prior tag
        id: changelog
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # `git describe ... TAG^` finds the most recent tag strictly before
          # the current tag. Falls back to the full history if this is the
          # very first tag (PRIOR empty → diff from repo root).
          PRIOR="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PRIOR" ]; then
            echo "Prior tag: $PRIOR"
            RANGE="${PRIOR}..${TAG}"
          else
            echo "No prior tag — using full history"
            RANGE="${TAG}"
          fi
          # Subject lines only, drop merge commits (their subjects are
          # noise). Skip the PR title prefix `Merge pull request #...`.
          git log --no-merges --pretty=format:'%s' "$RANGE" > release-artifacts/changelog.txt
          echo "--- changelog ---"
          cat release-artifacts/changelog.txt
          echo "--- end ---"

      - name: Update versions.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          VERSION="${TAG#v}"
          ASSET="smo-poptracker-${TAG}.zip"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
          python scripts/update_poptracker_versions.py \
            --version "$VERSION" \
            --download-url "$DOWNLOAD_URL" \
            --sha256-file release-artifacts/smo-poptracker.sha256 \
            --asset-name "$ASSET" \
            --changelog-file release-artifacts/changelog.txt

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BRANCH="release-bot/poptracker-versions-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If branch already exists upstream (retried workflow), reuse it.
          # The prior `Update versions.json` step has modified the main-branch
          # working tree, but origin/$BRANCH already contains that exact edit,
          # so `git checkout -B` would refuse with "local changes would be
          # overwritten". Discard the local mod first — we'll regenerate it
          # on the branch in a moment, and update_poptracker_versions.py is
          # idempotent so a no-op result is fine.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -- poptracker/versions.json
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # Commit + push only if there's something new. On retry the branch
          # already contains the entry, so this is a no-op — but we must NOT
          # early-exit here, because the original failure may have been the
          # `gh pr create` call that runs below.
          git add poptracker/versions.json
          if ! git diff --cached --quiet; then
            git commit -m "PopTracker auto-update: add ${TAG} to versions.json"
            git push origin "$BRANCH"
          fi

          # `gh pr create` errors if a PR for this branch already exists.
          if gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for ${BRANCH}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "PopTracker auto-update: add ${TAG}" \
            --body "$(cat <<EOF
          Auto-generated by the release workflow after publishing \`${TAG}\`.

          This adds the just-released PopTracker pack to
          [\`poptracker/versions.json\`](../blob/main/poptracker/versions.json),
          which the pack's \`versions_url\` manifest field points at. PopTracker
          fetches that JSON, compares the top entry's \`package_version\` against
          the installed pack's, and prompts the user to update if they differ.

          Safe to merge as-is. Squash-merging is fine — the diff is one entry
          prepended to the array.
          EOF
          )"
