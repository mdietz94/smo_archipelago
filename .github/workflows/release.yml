name: Release

# Tag-triggered: pushing a `vMAJOR.MINOR.PATCH` tag cuts a release.
# Also runnable via `workflow_dispatch` for dry-runs (uploads the artifact
# but skips the publish-release job because there's no tag to attach it to).
#
# Pre-release detection: any tag containing `-` (e.g. `v1.0.0-rc1`,
# `v0.2.0-alpha2`) is marked as a GitHub pre-release. Stable releases use
# bare semver.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Ensure only one release run at a time per tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # don't cancel: a released artifact is durable

jobs:
  build-apworld:
    name: Build release apworld zip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Bundling switch-mod sources needs both lunakit-vendor and
          # exlaunch submodules materialized. Archipelago submodule is
          # also needed because install_apworld.py writes into its
          # custom_worlds/ before we copy out.
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      # capture_table.h must exist before install_apworld --bundle-mod
      # tries to bundle the switch-mod source tree (CaptureGate.cpp
      # includes it; without it the user's wizard-driven build will fail).
      # The header is gitignored so we regenerate per-release from
      # items.json.
      - name: Sync capture table
        run: python scripts/sync_capture_table.py

      - name: Build apworld zip with bundled mod + scripts
        run: python scripts/install_apworld.py --bundle-mod --bundle-scripts

      # PopTracker pack — generated from the same apworld data the SMOClient
      # uses, so users get a logic-graph tracker that auto-syncs YAML options
      # via the AP autotracker. Independent artifact (a separate zip the user
      # drops into PopTracker's packs/ directory). The generator is stdlib-only;
      # no extra deps to install.
      - name: Build PopTracker pack zip
        run: |
          # Strip the leading 'v' off the tag for the in-manifest version
          # (workflow_dispatch falls back to the generator's auto-detect).
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            python scripts/build_poptracker_pack.py --zip --version "$VERSION"
          else
            python scripts/build_poptracker_pack.py --zip
          fi
          ls -lah poptracker/build/

      - name: Stage release artifacts + checksum
        run: |
          mkdir release-artifacts
          cp vendor/Archipelago/custom_worlds/smo.apworld release-artifacts/
          # The PopTracker zip filename has the version embedded; copy whatever
          # build_poptracker_pack.py produced.
          cp poptracker/build/smo-poptracker-v*.zip release-artifacts/
          cd release-artifacts
          sha256sum smo.apworld > smo.apworld.sha256
          sha256sum smo-poptracker-v*.zip > smo-poptracker.sha256
          ls -lah

      # Audit: confirm we did NOT leak any of the Nintendo-IP files that
      # extract_shine_map.py produces. CI catches this even if the local
      # blocklist in install_apworld.py regresses.
      - name: IP-discipline audit
        run: |
          set -e
          if unzip -l release-artifacts/smo.apworld | grep -E '(shine|capture)_map(_review)?\.json'; then
            echo "FAIL: Nintendo-content map file leaked into the release zip"
            exit 1
          fi
          echo "OK: no Nintendo-content map files in zip"

      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4
        with:
          name: smo-apworld
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-apworld
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # workflow_dispatch runs don't create a release — they only produce
    # the build artifact (downloadable from the Actions UI for testing).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: smo-apworld
          path: dist/

      - name: Show artifacts to be published
        run: ls -lah dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          # Any tag containing `-` (e.g. v1.0.0-rc1) is marked as pre-release.
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## SMO Archipelago ${{ github.ref_name }}

            ### First-time users — start here

            **📖 [docs/first-time-setup.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/first-time-setup.md)** — full walkthrough: prerequisites, multiworld generation, and the SMOClient setup wizard.

            ### Optional: PopTracker pack

            Download `smo-poptracker-${{ github.ref_name }}.zip` below and
            extract it into PopTracker's `packs/` directory (Windows:
            `%APPDATA%\PopTracker\packs\`). In PopTracker, load the pack
            and pick the **Archipelago** variant; enter the same host/port
            and slot name you used for SMOClient. The pack auto-syncs your
            YAML options from the AP server's slot_data and shows live
            reachability for all 482 location checks.

            **🔄 Changing AP server / slot / bridge PC after setup:**
            [docs/changing-servers.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/changing-servers.md)

            ### ⚠️ Compatibility requirements

            SMO Archipelago targets **Super Mario Odyssey 1.0.0** on a
            **modded Switch running Atmosphere CFW on firmware 21.x or
            earlier**.

            - **Platform:** **Windows only today.** Linux / macOS aren't
              blocked by design but the setup wizard and several scripts
              assume `%APPDATA%`, `C:/devkitPro`, and the Windows Python
              launcher; nobody has tested the flow on other platforms.
            - **SMO version:** must be **1.0.0**. Versions 1.1.0, 1.2.0,
              1.3.0 will not work. If you're on a newer version, use
              [Istador/odyssey-downgrade](https://github.com/Istador/odyssey-downgrade)
              to drop back to 1.0.0 first.
            - **Switch firmware:** must be **FW 21.x or earlier**.
              **FW 22+ is NOT supported** by this project — even though
              Atmosphere 1.11+ technically boots on FW22, the homebrew
              lifecycle changes Nintendo shipped in FW22 break the
              subsdk9-style mods we rely on. Stay on FW 21.x if you want
              to use SMO Archipelago.

            ### Verifying the downloads

            ```
            sha256sum -c smo.apworld.sha256
            sha256sum -c smo-poptracker.sha256
            ```

  propose-versions-update:
    name: Open PR to update poptracker/versions.json
    needs: publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only on tag push — workflow_dispatch runs skip this for the same
    # reason publish-release does (no tag, no released artifact to link).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write       # push the new branch
      pull-requests: write  # open the PR
    # Repo setting required: Settings → Actions → General →
    # "Allow GitHub Actions to create and approve pull requests" must be
    # enabled. Without it, `gh pr create` 403s.
    steps:
      - name: Check out main (not the tag)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          fetch-depth: 0   # need history to find the prior tag for the changelog

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Download release artifact (zip + .sha256)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: smo-apworld
          path: release-artifacts/

      - name: Compute changelog from commits since prior tag
        id: changelog
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # `git describe ... TAG^` finds the most recent tag strictly before
          # the current tag. Falls back to the full history if this is the
          # very first tag (PRIOR empty → diff from repo root).
          PRIOR="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PRIOR" ]; then
            echo "Prior tag: $PRIOR"
            RANGE="${PRIOR}..${TAG}"
          else
            echo "No prior tag — using full history"
            RANGE="${TAG}"
          fi
          # Subject lines only, drop merge commits (their subjects are
          # noise). Skip the PR title prefix `Merge pull request #...`.
          git log --no-merges --pretty=format:'%s' "$RANGE" > release-artifacts/changelog.txt
          echo "--- changelog ---"
          cat release-artifacts/changelog.txt
          echo "--- end ---"

      - name: Update versions.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          VERSION="${TAG#v}"
          ASSET="smo-poptracker-${TAG}.zip"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
          python scripts/update_poptracker_versions.py \
            --version "$VERSION" \
            --download-url "$DOWNLOAD_URL" \
            --sha256-file release-artifacts/smo-poptracker.sha256 \
            --asset-name "$ASSET" \
            --changelog-file release-artifacts/changelog.txt

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BRANCH="release-bot/poptracker-versions-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If branch already exists upstream (retried workflow), reuse it.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git add poptracker/versions.json
          if git diff --cached --quiet; then
            echo "versions.json already contains ${TAG} — nothing to PR"
            exit 0
          fi

          git commit -m "PopTracker auto-update: add ${TAG} to versions.json"
          git push origin "$BRANCH"

          # `gh pr create` is a no-op (well, errors) if a PR for this branch
          # already exists, so check first.
          if gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for ${BRANCH}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "PopTracker auto-update: add ${TAG}" \
            --body "$(cat <<EOF
          Auto-generated by the release workflow after publishing \`${TAG}\`.

          This adds the just-released PopTracker pack to
          [\`poptracker/versions.json\`](../blob/main/poptracker/versions.json),
          which the pack's \`versions_url\` manifest field points at. PopTracker
          fetches that JSON, compares the top entry's \`package_version\` against
          the installed pack's, and prompts the user to update if they differ.

          Safe to merge as-is. Squash-merging is fine — the diff is one entry
          prepended to the array.
          EOF
          )"
