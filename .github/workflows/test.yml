name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      # Only vendor/Archipelago is needed for the Python suite. The C++
      # switch-mod/sys (LibHakkun) and switch-mod/lib/OdysseyHeaders
      # submodules are AArch64-only and the host tests don't use them.
      - name: Initialize Archipelago submodule
        run: git submodule update --init --depth 1 vendor/Archipelago

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      # Filter AP's requirements down to the headless-server subset:
      #   - kivy/kivymd:  GUI, not needed for tests (also slow to build on CI)
      #   - pyshortcuts:  desktop integration
      #   - Pymem:        Windows-only (ctypes against the Win32 process API)
      # ModuleUpdate.update_ran=True in ap_generate.py / ap_server.py keeps
      # AP from auto-pip'ing the rest at runtime.
      - name: Install Archipelago deps (headless subset)
        run: |
          python -m pip install --upgrade pip wheel
          grep -Ev '^(kivy|kivymd|pyshortcuts|Pymem)' vendor/Archipelago/requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install pytest pytest-asyncio

      # network_data_package is assembled at import time of `worlds`
      # (vendor/Archipelago/worlds/__init__.py L195) by iterating
      # AutoWorldRegister.world_types. SMO is only in that map if the
      # apworld zip is present in custom_worlds/ when discovery runs,
      # so install it before pytest imports CommonClient.
      - name: Install apworld zip (so SMO registers in AP's data package)
        run: python scripts/install_apworld.py

      - name: Run pytest
        run: python -m pytest -v apworld/smo_archipelago/tests/

  python-live-ap:
    name: Live AP loopback + generation sweep
    runs-on: ubuntu-latest
    needs: python-unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Initialize Archipelago submodule
        run: git submodule update --init --depth 1 vendor/Archipelago

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Archipelago deps (headless subset)
        run: |
          python -m pip install --upgrade pip wheel
          grep -Ev '^(kivy|kivymd|pyshortcuts|Pymem)' vendor/Archipelago/requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install pytest pytest-asyncio

      # Required by test_ap_loopback (the bridge loads the apworld from
      # vendor/Archipelago/custom_worlds/) and test_apworld_generation
      # (the fixture rebuilds it but a baseline install is harmless).
      - name: Install apworld zip
        run: python scripts/install_apworld.py

      # Full sweep is 19 scenarios * 2 (solo + multi-world partner). At
      # ~5s per generation that's ~3 minutes; well within the 20m job
      # timeout. The fast-mode env (SMOAP_GEN_TEST_FAST=1) is still
      # honored locally for quick smoke runs.
      - name: Run live-AP tests
        env:
          SMOAP_LIVE_AP: '1'
        run: |
          python -m pytest -v \
            apworld/smo_archipelago/tests/test_ap_loopback.py \
            apworld/smo_archipelago/tests/test_apworld_generation.py

  poptracker-pack:
    name: PopTracker pack generator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      # Pack generator is stdlib-only (parser + translator + region-prereq
      # flatten + access-rule emitter). Self-tests are 30+ asserts that
      # cover the requires-string mini-language, festival% scope detection
      # (incl. MetroPeace regex), Goal-option mapping, kingdom-prereq
      # flattening, dnf dedupe, and code_for naming.
      - name: Run pack self-tests
        run: python scripts/build_poptracker_pack.py --self-test

      # Build the full pack against the actual apworld data — catches any
      # bug in the requires-parser/translator that the self-tests don't
      # exercise (e.g. an unhandled syntax in a new location's `requires`).
      - name: Build pack against current apworld data
        run: python scripts/build_poptracker_pack.py

  cpp-host:
    name: Switch-mod host tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      # ubuntu-latest already ships a recent g++ (>= 13). All four host
      # tests are pure C++20, header-only-from-the-Switch-side via
      # SMOAP_HOST_TEST guards (see switch-mod/src/util/Log.hpp).
      - name: Show compiler version
        run: g++ --version

      - name: Build + run test_json
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g \
            switch-mod/tests/test_json.cpp \
            switch-mod/src/util/Json.cpp \
            -Iswitch-mod/src -o test_json
          ./test_json

      - name: Build + run test_protocol
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g \
            switch-mod/tests/test_protocol.cpp \
            switch-mod/src/ap/ApProtocol.cpp \
            switch-mod/src/util/Json.cpp \
            -Iswitch-mod/src -o test_protocol
          ./test_protocol

      - name: Build + run test_cappy_messenger
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g -DSMOAP_HOST_TEST \
            switch-mod/tests/test_cappy_messenger.cpp \
            switch-mod/src/ui/CappyMessenger.cpp \
            -Iswitch-mod/src -o test_cappy_messenger
          ./test_cappy_messenger

      - name: Build + run test_shine_lookup
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g -DSMOAP_HOST_TEST \
            switch-mod/tests/test_shine_lookup.cpp \
            -Iswitch-mod/src -o test_shine_lookup
          ./test_shine_lookup

  windows-path-strip:
    # Cheaper sibling of release.yml's clean-windows-audit job — runs on
    # every PR. Build switch-mod with PATH narrowed to ONLY the vendored
    # toolchain dirs (no system Python, no msys2, no MS Store stubs).
    # If a future patch to build_switchmod.py or its cmake includes
    # shells out to a bare `python` / `python3` / `bash`, the build
    # breaks here — long before a tagged release surfaces it on a real
    # user's machine.
    #
    # Skips the heavy parts of clean-windows-audit (Python quarantine,
    # apworld zip build + bundled-tree extract, release_audit walk) and
    # invokes build_switchmod.py directly. ~8-12 min vs ~20-25 min for
    # the full audit.
    name: Windows PATH-strip build
    runs-on: windows-2022
    timeout-minutes: 20
    env:
      SMOAP_LLVM_BIN: ${{ github.workspace }}\ci-toolchain\llvm\bin
      SMOAP_MINGW_BIN: ${{ github.workspace }}\ci-toolchain\winlibs\mingw64\bin
      SMOAP_PYTHON_BIN: ${{ github.workspace }}\.python312
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # switch-mod/sys (LibHakkun) + switch-mod/lib/OdysseyHeaders
          # are the AArch64-only submodules the build configure needs.
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Pin Python 3.12 to a fixed location
        shell: pwsh
        run: |
          $src = Split-Path -Parent (Get-Command python).Source
          Copy-Item -Recurse -Force $src ${{ env.SMOAP_PYTHON_BIN }}
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" -m pip install --upgrade pip
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" -m pip install lz4 pyelftools mmh3

      - name: Cache LLVM 19 + WinLibs
        id: toolchain-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4
        with:
          path: ${{ github.workspace }}\ci-toolchain
          # Keep this key in sync with the matching one in release.yml's
          # clean-windows-audit job so both workflows hit the same cache
          # entry.
          key: ci-toolchain-llvm19.1.7-winlibs-gcc16.1.0-r2

      - name: Download + extract LLVM 19.1.7
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dst = "${{ github.workspace }}\ci-toolchain\llvm"
          New-Item -ItemType Directory -Force $dst | Out-Null
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/clang+llvm-19.1.7-x86_64-pc-windows-msvc.tar.xz"
          $tar = "$env:RUNNER_TEMP\llvm.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile $tar -UseBasicParsing
          $expected = "b4557b4f012161f56a2f5d9e877ab9635cafd7a08f7affe14829bd60c9d357f0"
          $actual = (Get-FileHash $tar -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "LLVM SHA256 mismatch: $actual vs $expected" }
          $tmp = "$env:RUNNER_TEMP\llvm-extract"
          New-Item -ItemType Directory -Force $tmp | Out-Null
          tar -xf $tar -C $tmp
          $root = Get-ChildItem $tmp | Where-Object { $_.PSIsContainer } | Select-Object -First 1
          Move-Item "$($root.FullName)\*" $dst
          if (-not (Test-Path "$dst\bin\clang.exe")) { throw "LLVM extract failed" }

      - name: Download + extract WinLibs g++
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dst = "${{ github.workspace }}\ci-toolchain\winlibs"
          New-Item -ItemType Directory -Force $dst | Out-Null
          $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/16.1.0posix-14.0.0-ucrt-r2/winlibs-x86_64-posix-seh-gcc-16.1.0-mingw-w64ucrt-14.0.0-r2.zip"
          $zip = "$env:RUNNER_TEMP\winlibs.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          if (-not (Test-Path "$dst\mingw64\bin\g++.exe")) { throw "WinLibs extract failed" }

      - name: Resolve cmake + ninja bin dirs
        shell: pwsh
        run: |
          $cmakeDir = Split-Path -Parent (Get-Command cmake).Source
          $ninjaDir = Split-Path -Parent (Get-Command ninja).Source
          echo "SMOAP_CMAKE_BIN=$cmakeDir" >> $env:GITHUB_ENV
          echo "SMOAP_NINJA_BIN=$ninjaDir" >> $env:GITHUB_ENV
          Write-Host "[resolve] cmake bin: $cmakeDir"
          Write-Host "[resolve] ninja bin: $ninjaDir"

      - name: Sync capture table (gitignored header the build needs)
        shell: pwsh
        run: |
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" scripts\sync_capture_table.py

      - name: Build with PATH stripped to vendored toolchain only
        shell: pwsh
        # The whole point of this job: a PATH that contains NOTHING
        # except the SMOAP_*_BIN dirs + the bare minimum Windows system
        # dirs (System32 for curl/tar; the resolved cmake/ninja dirs).
        # If build_switchmod.py or any of its cmake-driven children
        # shells out to bare `python` / `python3` / `bash` / etc and
        # the lookup escapes the vendored install, the build fails.
        run: |
          $env:PATH = @(
            "${{ env.SMOAP_PYTHON_BIN }}",
            "${{ env.SMOAP_LLVM_BIN }}",
            "${{ env.SMOAP_MINGW_BIN }}",
            "$env:SMOAP_CMAKE_BIN",
            "$env:SMOAP_NINJA_BIN",
            "$env:windir\System32",
            "$env:windir"
          ) -join ';'
          Write-Host "[path-strip] effective PATH: $env:PATH"
          Write-Host "[path-strip] python.exe resolves to:"
          Get-Command python -All -ErrorAction SilentlyContinue | Select-Object -First 3 | Format-Table Source
          & "${{ env.SMOAP_PYTHON_BIN }}\python.exe" scripts\build_switchmod.py -DBRIDGE_HOST=127.0.0.1

      - name: Verify build outputs exist
        shell: pwsh
        run: |
          $sd = "switch-mod\build\sd\atmosphere\contents\0100000000010000\exefs"
          $required = @("$sd\subsdk9", "$sd\main.npdm", "switch-mod\src\ap\capture_table.h")
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Host "[verify] FAIL: missing build outputs:"
            $missing | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "[verify] OK: all required artifacts present"

  hakkun-bare-shellouts:
    # Guard against the next LibHakkun upstream pull adding a new bare-name
    # `execute_process(COMMAND python3 ...)` (or python/curl/wget/bash/sh)
    # that we haven't defended in scripts/build_switchmod.py. On Windows
    # bare `python3` resolves to the Microsoft Store stub by default
    # (silent no-op), `python` resolves to whatever 3.x is first on PATH
    # (lz4 misses), `curl` is fine in System32 but the same pattern.
    # cmake captures the result var but never checks it, so these failures
    # surface much later as cryptic link errors.
    #
    # Each known occurrence MUST be pre-defended by an ensure_*() in
    # scripts/build_switchmod.py BEFORE the count below is bumped. See
    # PR #164 for the pattern (toolchain.cmake's libstd download +
    # sail.cmake's setup_sail).
    name: Hakkun bare-name shell-out guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Initialize LibHakkun submodule (shallow)
        run: git submodule update --init --depth 1 switch-mod/sys

      - name: Count bare-name execute_process invocations
        run: |
          # Defended occurrences in scripts/build_switchmod.py:
          #   sail.cmake:18         -> ensure_sail_built()
          #   toolchain.cmake:111   -> ensure_libstd_downloaded()
          EXPECTED=2
          ACTUAL=$(grep -rnE 'execute_process[[:space:]]*\(COMMAND[[:space:]]+(python3|python|curl|wget|bash|sh)\b' switch-mod/sys/cmake/ | wc -l)
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "::error::Bare-name cmake execute_process count changed: expected $EXPECTED, found $ACTUAL"
            echo "Hits:"
            grep -rnE 'execute_process[[:space:]]*\(COMMAND[[:space:]]+(python3|python|curl|wget|bash|sh)\b' switch-mod/sys/cmake/ || true
            echo ""
            echo "Each occurrence MUST be pre-defended by ensure_*() in"
            echo "scripts/build_switchmod.py BEFORE bumping EXPECTED in this"
            echo "workflow. On Windows these resolve to the wrong interpreter"
            echo "(python3 -> Store stub; python -> wrong 3.x). See PR #164."
            exit 1
          fi
          echo "OK: $ACTUAL bare-name execute_process invocations, all defended."
