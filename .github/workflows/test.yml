name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      # Only vendor/Archipelago is needed for the Python suite. The C++
      # switch-mod/sys (LibHakkun) and switch-mod/lib/OdysseyHeaders
      # submodules are AArch64-only and the host tests don't use them.
      - name: Initialize Archipelago submodule
        run: git submodule update --init --depth 1 vendor/Archipelago

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      # Filter AP's requirements down to the headless-server subset:
      #   - kivy/kivymd:  GUI, not needed for tests (also slow to build on CI)
      #   - pyshortcuts:  desktop integration
      #   - Pymem:        Windows-only (ctypes against the Win32 process API)
      # ModuleUpdate.update_ran=True in ap_generate.py / ap_server.py keeps
      # AP from auto-pip'ing the rest at runtime.
      - name: Install Archipelago deps (headless subset)
        run: |
          python -m pip install --upgrade pip wheel
          grep -Ev '^(kivy|kivymd|pyshortcuts|Pymem)' vendor/Archipelago/requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install pytest pytest-asyncio

      # network_data_package is assembled at import time of `worlds`
      # (vendor/Archipelago/worlds/__init__.py L195) by iterating
      # AutoWorldRegister.world_types. SMO is only in that map if the
      # apworld zip is present in custom_worlds/ when discovery runs,
      # so install it before pytest imports CommonClient.
      - name: Install apworld zip (so SMO registers in AP's data package)
        run: python scripts/install_apworld.py

      - name: Run pytest
        run: python -m pytest -v apworld/smo_archipelago/tests/

  python-live-ap:
    name: Live AP loopback + generation sweep
    runs-on: ubuntu-latest
    needs: python-unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Initialize Archipelago submodule
        run: git submodule update --init --depth 1 vendor/Archipelago

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Archipelago deps (headless subset)
        run: |
          python -m pip install --upgrade pip wheel
          grep -Ev '^(kivy|kivymd|pyshortcuts|Pymem)' vendor/Archipelago/requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install pytest pytest-asyncio

      # Required by test_ap_loopback (the bridge loads the apworld from
      # vendor/Archipelago/custom_worlds/) and test_apworld_generation
      # (the fixture rebuilds it but a baseline install is harmless).
      - name: Install apworld zip
        run: python scripts/install_apworld.py

      # Full sweep is 19 scenarios * 2 (solo + multi-world partner). At
      # ~5s per generation that's ~3 minutes; well within the 20m job
      # timeout. The fast-mode env (SMOAP_GEN_TEST_FAST=1) is still
      # honored locally for quick smoke runs.
      - name: Run live-AP tests
        env:
          SMOAP_LIVE_AP: '1'
        run: |
          python -m pytest -v \
            apworld/smo_archipelago/tests/test_ap_loopback.py \
            apworld/smo_archipelago/tests/test_apworld_generation.py

  poptracker-pack:
    name: PopTracker pack generator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      # Pack generator is stdlib-only (parser + translator + region-prereq
      # flatten + access-rule emitter). Self-tests are 30+ asserts that
      # cover the requires-string mini-language, festival% scope detection
      # (incl. MetroPeace regex), Goal-option mapping, kingdom-prereq
      # flattening, dnf dedupe, and code_for naming.
      - name: Run pack self-tests
        run: python scripts/build_poptracker_pack.py --self-test

      # Build the full pack against the actual apworld data — catches any
      # bug in the requires-parser/translator that the self-tests don't
      # exercise (e.g. an unhandled syntax in a new location's `requires`).
      - name: Build pack against current apworld data
        run: python scripts/build_poptracker_pack.py

  cpp-host:
    name: Switch-mod host tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      # ubuntu-latest already ships a recent g++ (>= 13). All four host
      # tests are pure C++20, header-only-from-the-Switch-side via
      # SMOAP_HOST_TEST guards (see switch-mod/src/util/Log.hpp).
      - name: Show compiler version
        run: g++ --version

      - name: Build + run test_json
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g \
            switch-mod/tests/test_json.cpp \
            switch-mod/src/util/Json.cpp \
            -Iswitch-mod/src -o test_json
          ./test_json

      - name: Build + run test_protocol
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g \
            switch-mod/tests/test_protocol.cpp \
            switch-mod/src/ap/ApProtocol.cpp \
            switch-mod/src/util/Json.cpp \
            -Iswitch-mod/src -o test_protocol
          ./test_protocol

      - name: Build + run test_cappy_messenger
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g -DSMOAP_HOST_TEST \
            switch-mod/tests/test_cappy_messenger.cpp \
            switch-mod/src/ui/CappyMessenger.cpp \
            -Iswitch-mod/src -o test_cappy_messenger
          ./test_cappy_messenger

      # shine_table.h is gitignored (joins committed locations.json with
      # the gitignored extracted shine_map.json; see CLAUDE.md). CI has
      # no NSP to extract from, so we point sync_shine_table.py at a
      # checked-in IP-free fixture pair (synthetic moon names + real
      # stage/obj/uid identifiers from the production data the test
      # already asserts against). Generated header lands at the path
      # shine_lookup.hpp expects.
      - name: Generate shine_table.h from CI fixture
        run: |
          python scripts/sync_shine_table.py \
            --locations switch-mod/tests/locations_fixture.json \
            --shine-map switch-mod/tests/shine_map_fixture.json

      - name: Build + run test_shine_lookup
        run: |
          g++ -std=c++20 -Wall -Wextra -O0 -g -DSMOAP_HOST_TEST \
            switch-mod/tests/test_shine_lookup.cpp \
            -Iswitch-mod/src -o test_shine_lookup
          ./test_shine_lookup

  # NOTE: the PR-time `windows-path-strip` job was removed 2026-05-22
  # because cold-cache LLVM download + extract consistently blew through
  # the 20-min job timeout (~700 MB tar.xz → ~1.5 GB extract on a
  # windows-2022 runner). The release.yml `clean-windows-audit` job is
  # the load-bearing equivalent and runs on tag push (or workflow_dispatch
  # against a tag). Trigger it manually before cutting a release if you
  # want a Windows build sanity-check without tagging.

  hakkun-bare-shellouts:
    # Guard against a LibHakkun upstream pull adding a new bare-name
    # `python3`/`python`/`curl`/`wget`/`bash`/`sh` COMMAND that we haven't
    # defended in scripts/build_switchmod.py. On Windows: bare `python3`
    # resolves to the Microsoft Store stub by default (silent no-op);
    # bare `python` resolves to whatever 3.x is first on PATH (likely
    # missing lz4); bare `curl` is fine in System32 but follows the same
    # pattern. Two qualitatively different failure modes depending on
    # the cmake invocation shape:
    #
    #   - `execute_process(COMMAND python3 ...)` at CONFIGURE time:
    #     cmake silently swallows non-zero return codes when neither
    #     RESULT_VARIABLE nor COMMAND_ERROR_IS_FATAL is set. The bad
    #     outcome surfaces much later as a cryptic link error.
    #     Defense: scripts/build_switchmod.py:ensure_*() materializes
    #     the output file pre-cmake so the bare-name call's outcome
    #     doesn't matter (the configure-time call no-ops via the
    #     enclosing `if(NOT EXISTS ...)` guard).
    #
    #   - `add_custom_command(... COMMAND python ...)` at BUILD time:
    #     run by ninja, which aborts the build on non-zero — failures
    #     are loud. Defense: scripts/build_switchmod.py:configure_env()
    #     prepends SMOAP_PYTHON_BIN to the ninja child's PATH so bare
    #     `python` resolves to the wizard-pinned 3.12 interpreter.
    #     Only effective when the build runs THROUGH build_switchmod.py;
    #     a developer running `cd build && ninja` directly bypasses
    #     this defense and will hit one of the failure modes above.
    #
    # The guard tracks BOTH shapes so a future upstream pull adding a
    # third bare-name call (in either shape) trips this check until
    # the new occurrence is audited and added to the right defense
    # path. Bumping EXPECTED requires verifying the new call is
    # defended; comment which path it falls under.
    name: Hakkun bare-name shell-out guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Initialize LibHakkun submodule (shallow)
        run: git submodule update --init --depth 1 switch-mod/sys

      - name: Count bare-name COMMAND invocations
        run: |
          # Defended occurrences in the current pin (e92ac56...):
          #   deploy.cmake:4        -> add_custom_command, defended by
          #                            configure_env() PATH-prepend
          #   generate_exefs.cmake  -> add_custom_command, defended by
          #                            configure_env() PATH-prepend
          # The 2026-05-22 pin bump retired the prior configure-time
          # execute_process pair (defended by ensure_sail_built() /
          # ensure_libstd_downloaded()); both ensure_*() helpers stay
          # in build_switchmod.py as backstops in case upstream
          # restructures back.
          EXPECTED=2
          ACTUAL=$(grep -rnE '\bCOMMAND[[:space:]]+(python3|python|curl|wget|bash|sh)\b' switch-mod/sys/cmake/ | wc -l)
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "::error::Bare-name cmake COMMAND count changed: expected $EXPECTED, found $ACTUAL"
            echo "Hits:"
            grep -rnE '\bCOMMAND[[:space:]]+(python3|python|curl|wget|bash|sh)\b' switch-mod/sys/cmake/ || true
            echo ""
            echo "Each occurrence MUST be defended in scripts/build_switchmod.py"
            echo "before bumping EXPECTED. execute_process(COMMAND ...) needs an"
            echo "ensure_*() helper; add_custom_command(... COMMAND ...) is"
            echo "defended by configure_env()'s PATH-prepend (only valid when"
            echo "the build runs through build_switchmod.py, not raw ninja)."
            echo "See PR #164 for the original pattern and PR #205 for the"
            echo "build-time pattern."
            exit 1
          fi
          echo "OK: $ACTUAL bare-name COMMAND invocations, all defended."
