# Spicy Meatball Overdrive bridge configuration.
# Copy to config.toml and edit. Or pass --config <path>.

[ap]
# Archipelago server connection.
# For local development (M5.5 loopback), use host = "localhost" and host a
# MultiServer on the same machine — see the loopback recipe in ../README.md.
# A copy of this file with localhost settings is conventionally `config.local.toml`
# (gitignored).
host = "archipelago.gg"
port = 38281
slot = "Mario"
# Password may also be provided via SMOAP_PASSWORD env var (preferred for secrets).
password = ""
# Bit flags: 1=remote items, 2=own-world items, 4=starting inventory.
# Default 7 = receive everything (recommended; needed so moon flags replay on reconnect).
items_handling = 7

[switch]
# TCP server the Switch module connects to.
listen_host = "0.0.0.0"
listen_port = 17777

[bridge]
log_level = "INFO"
# When true, serve the web tracker on web_port.
web_tracker = true
web_port = 8000
# Path to local Archipelago checkout. Empty = look in vendor/Archipelago,
# then fall back to the SMOAP_AP_PATH env var.
archipelago_path = ""

[deathlink]
# When true: the bridge adds the "DeathLink" tag on AP connect, forwards
# Switch deaths to AP as Bounce, and forwards inbound DeathLink bounces from
# AP to the Switch mod (which actually kills Mario, debounced and loop-safe).
# Communicated to the mod in the hello_ack handshake so toggling doesn't
# require a Switch rebuild.
enabled = false
